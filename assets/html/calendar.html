<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Manager</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/mobileStyle.css" />
  <link rel="stylesheet" href="../css/styleCalendar.css" />
  <link rel="stylesheet" href="../css/modal.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
</head>

<body>
  <div class="modal-container">
    <div class="menuModal">
      <ul>
        <li><a href="#">Calendário de Reservas</a></li>
        <li><a href="user.html">Perfil de Usuário</a></li>
      </ul>
      <button onclick="quitMenuModal()" class="menuModalBtn">Fechar Menu</button>
      <button onclick="redirectLogin()" class="menuModalBtn">Fazer Log Out</button>
    </div>
  </div>

  <header>
    <h2 class="h2-header">Etec</h2>
    <h1>Space Manager</h1>
    <a href="#" class="a-header"><i class="fa-solid fa-bars" onclick="openMenuModal()"></i></a>
  </header>


  <div id="container">
    <div id="header">
      <button id="backButton">Voltar</button>
      <div id="monthDisplay"></div>
      <button id="nextButton">Próximo</button>
    </div>

    <div id="weekdays">
      <div class="dom">Domingo</div>
      <div class="seg">Segunda</div>
      <div class="ter">Terça</div>
      <div class="qua">Quarta</div>
      <div class="qui">Quinta</div>
      <div class="sex">Sexta</div>
      <div class="sab">Sábado</div>
    </div>

    <div id="calendar"></div>
  </div>

  <div id="newEventModal">
    <h2 style="text-align: center;">Nova Reserva</h2>
    <select name="classReserv" id="eventTitleInput">
      <option value="" class="ooption" disabled selected>Selecionar a Sala da Reserva</option>
      <option value="Multiuso 1">Multiuso 1</option>
      <option value="Multiuso 2">Multiuso 2</option>
      <option value="Multiuso 3">Multiuso 3</option>
      <option value="Multiuso 4">Multiuso 4</option>
      <option value="Auditório">Auditório</option>
      <option value="Biblioteca">Biblioteca</option>
      <option value="Lab. Segurança do Trabalho">Lab. Segurança do Trabalho</option>
      <option value="Lab. Enfermagem">Lab. Enfermagem</option>
      <option value="Lab. Química">Lab. Química</option>
      <option value="Quadra">Quadra</option>
    </select>
    <form action="" method="post" class="form1">
      <select name="" id="eventTime">
        <option value="horario" class="ooption" disabled selected>Horário</option>
        <option value="T1">7:30 - 8:20</option>
        <option value="T1">8:20 - 9:10</option>
        <option value="T1">9:10 - 10:00</option>
        <option value="T1">Intervalo</option>
        <option value="T1">10:20 - 11:10</option>
        <option value="T1">11:10 - 12:00</option>
        <option value="T1">12:00 - 12:50</option>
      </select>
      <select name="materia" id="materia">
        <option value="" class="ooption" disabled selected>Matéria</option>
        <option value="Desenvolvimento Tcc">Desenvolvimento Tcc</option>
      </select>
      <select name="classe" id="class">
        <option value="" class="ooption" disabled selected>Turma</option>
        <option value="">Turma1</option>
      </select>

      <div class="descripcao">
        <label for="descrip">Descrição da Reserva</label><br>
        <textarea name="descrip" class="descrip" id="descrip" rows="4"></textarea>
      </div>
    </form>
    <div class="controlls">
      <button id="saveButton">Salvar</button>
      <button id="cancelButton">Cancelar</button>
    </div>

  </div>

  <div id="deleteEventModal">
    <h2 id="eventText"></h2>

    <div class="statsEvent">
      <h3 class="eventTime">00:00 - 00:00</h3>
      <h3 class="eventMat">Materia</h3>
      <h3 class="eventClass">Classe</h3>
    </div>
    <button id="deleteButton">Deletar</button>
    <button id="closeButton">Fechar</button>
  </div>

  <div id="modalBackDrop"></div>

  <div id="containerM">
    <div class="containerM">
      <h2 class="toReservaH2">Nova Reserva</h2>
      <select name="classReserv" id="toReserva">
        <option value="" class="ooption" disabled selected>Selecionar a Sala da Reserva</option>
        <option value="Multiuso 1">Multiuso 1</option>
        <option value="Multiuso 2">Multiuso 2</option>
        <option value="Multiuso 3">Multiuso 3</option>
        <option value="Multiuso 4">Multiuso 4</option>
        <option value="Auditório">Auditório</option>
        <option value="Biblioteca">Biblioteca</option>
        <option value="Lab. Segurança do Trabalho">Lab. Segurança do Trabalho</option>
        <option value="Lab. Enfermagem">Lab. Enfermagem</option>
        <option value="Lab. Química">Lab. Química</option>
        <option value="Quadra">Quadra</option>
      </select>
      <form action="" method="post" class="form1">
        <select name="" id="eventTimeM">
          <option value="horario" class="ooption" disabled selected>Horário</option>
          <option value="T1">7:30 - 8:20</option>
          <option value="T1">8:20 - 9:10</option>
          <option value="T1">9:10 - 10:00</option>
          <option value="T1">Intervalo</option>
          <option value="T1">10:20 - 11:10</option>
          <option value="T1">11:10 - 12:00</option>
          <option value="T1">12:00 - 12:50</option>
        </select>
        <select name="materia" id="materiaM">
          <option value="" class="ooption" disabled selected>Matéria</option>
          <option value="Desenvolvimento Tcc">Desenvolvimento Tcc</option>
        </select>
        <select name="classe" id="classM">
          <option value="" class="ooption" disabled selected>Turma</option>
          <option value="">Turma1</option>
        </select>

        <div class="descripcao">
          <label for="descrip">Descrição da Reserva</label><br>
          <textarea name="descrip" class="descrip descripM" id="descrip" rows="4"></textarea>
        </div>
      </form>
      <div class="controlls">
        <button id="saveButton">Salvar</button>
      </div>
    </div>
  </div>

  <script src="../js/calendar.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/login.js"></script>
</body>

</html>
