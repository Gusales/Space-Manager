<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Manager</title>
  <link rel="shortcut icon" href="../img/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/profile.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
</head>
<header class="userHeader">
  <h1>Space Manager</h1>
  <a href="calendar.html"><img src="../img/voltar.png" alt="Voltar" class="btnVoltar"></a>
</header>
<section class="mainContainer">
  <div class="profile">
    <div>
      <img src="../img/userPhoto.png" alt="Imagem de perfil" class="profileImg"><br>
      <h1 class="nomeProfessor">Nome do Professor</h1>
      <h2>Escola</h2>
    </div>
  </div>
  <div class="profileContainer">
    <form action="" method="post" class="formProfile">
      <label for="Email">Nome completo:</label><br>
      <input type="text" placeholder="" id="nomeProfile" disabled><br>
      <label for="Email">Email:</label><br>
      <input type="email" placeholder="" id="emailProfile" disabled><br>
      <label for="Email">Número de matrícula:</label><br>
      <input type="number" placeholder="" id="rmProfile" disabled><br>
      <label for="materia">Matéria(s):</label><br>
      <input type="email" placeholder="" id="matProfile" disabled><i class="fa-solid fa-plus"
        alt="adicionar nova matéria"></i><br>
      <label for="Numero">Telefone para Contato:</label><br>
      <input type="tel" placeholder="" id="numProfile" disabled><br>
    </form>

    <button id="saveButton"><i class="fa-solid fa-user-pen"></i></button>
    <div class="controllers">
      <button id="saveButton"><i class="fa-solid fa-floppy-disk"></i></button>
      <button id="cancelButton"><i class="fa-solid fa-xmark"></i></button>
    </div>
</section>
</body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.inputmask/5.0.7/jquery.inputmask.min.js"></script>
<script src="../js/main.js"></script>

</html>
