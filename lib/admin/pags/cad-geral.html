<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Manager - Cadastro de novos usuários</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link rel="stylesheet" href="../css/hamburguerIcon.css">
    <link rel="stylesheet" href="../css/cad-geral.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />

</head>

<body onload="dinamic()">
    <header>
        <h1>Space Manager</h1>
        <div class="profilePIC navbar-toggler" type="button" data-bs-toggle="modal" data-bs-target="#userModal">
          <i class="fa-solid fa-bars"></i>
        </div>
      </header>
    
      <div class="modal fade" id="userModal" tabindex="-1" aria-labelledby="userModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen">
          <div class="modal-content">
            <div class="modal-header">
              <h2 class="modal-title" id="userModalLabel"><b>Painel de Administração</b></h2>
              <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <div class="informacoesUser">
                <a href="../">Reservas</a>
                <a href="professores.html">Professores Cadastrados</a>
                <a href="cad-geral.html">Turmas, Matérias e Horários cadastrados</a>
                <a href="turmas-e-materias.html">Cadastrar Turmas, Matérias e Horários</a>
              </div>
            </div>
          </div>
        </div>
      </div>

    <section class="mainContainer">

        <section class="row row1">
            <select name="select1" id="cursos">
                <option value="curso1">Curso1</option>
                <option value="curso2">Curso1</option>
            </select>
        </section>

        <section class="row row2">
            <select name="cursoSelecionado" id="cursoSelecionado">
                <option value="tec">info</option>
            </select>
            <select name="horario" id="horario">
                <option value="hora">hora</option>
            </select>
            <div class="conteudo horarioSelecionado">7:30 - 8:30</div>
            <div></div>
            <div></div>
        </section>

        <section class="row row3">
            <div class="oculta"></div>
            <select name="turma" id="turmas">
                <option value="turma1">turma1</option>
            </select>
            <div class="conteudo turmaSelecionada">1</div>
            <select name="materia" id="materia">
                <option value="materia1">materia1</option>
            </select>
            <div class="conteudo materiaSelecionada">portugues</div>
        </section>
    </section>

    <script src="../js/main.js"></script>
    <script src="../js/cad-geral-style.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-A3rJD856KowSb7dwlZdYEkO39Gagi7vIsF0jrRAoQmDKKtQBHUuLZ9AsSv4jD4Xa" crossorigin="anonymous"></script>

</body>

</html>
