<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Manager - Cadastro de novos usuários</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
</head>
<header>
    <h1>Space Manager</h1>
    <div class="profilePIC">
      <a href="professores.html" class="profName">Professores</a>
      <a href="../home.html" class="profName">Horário Agendados</a>
      <button class="profName pAdm" onclick="openM()">
        Painel de Administração
      </button>
    </div>
    <div class="dropdownMenu">
      <a href="cadastro.html" class="dropLink">Adicionar usuário</a></li><br><br>
      <a href="../home.html" class="dropLink">Reservas</a><br>
      <button class="exitDrop" onclick="quitDrop()">Sair</button>
    </div>
  </header>
<section class="mainContainer">
    <div class="profile">
        <div>
            <img src="../img/userPhoto.png" alt="Imagem de perfil" class="profileImg"><br>
        <a href="" class="addFotoProf">Adicionar Foto do Professor</a>
        </div>
    </div>
    <div class="profileContainer">
            <h2 class="titleProfile">Cadastrar novo usuário</h2>
            <form action="" method="post" class="formProfile">
                <label for="Email">Nome completo:</label><br>
                <input type="text" placeholder="Nome sobrenome" id="nomeProfile"><br>
                <label for="Email">Email:</label><br>
                <input type="email" placeholder="exemplo@exemplo.com" id="emailProfile"><br>
                <label for="Email">Número de matrícula:</label><br>
                <input type="number" placeholder="111" id="rmProfile"><br>
                <label for="materia">Matéria(s):</label><br>
                <input type="email" placeholder="Exemplo" id="matProfile"><i class="fa-solid fa-plus"
                    alt="adicionar nova matéria"></i><br>
                <label for="Numero">Telefone para Contato:</label><br>
                <input type="tel" placeholder="(00) 0000-0000" id="numProfile"><br>

                <div class="controllers">
                  <button id="saveButton"><i class="fa-solid fa-floppy-disk"></i></button>
                <button id="cancelButton"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </form>
    </div>
</section>
</body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.inputmask/5.0.7/jquery.inputmask.min.js"></script>
<script>
  $(document).ready(() => {
  $('#numProfile').inputmask('(99)99999-9999')
});
</script>
<script src="../js/main.js"></script>
</html>
